/* ─── Particle Canvas ─── */
const ParticleCanvas = () => {
  const canvasRef = useRef(null);
  const mouseRef = useRef({ x: -1000, y: -1000 });
  const particlesRef = useRef([]);
  const animRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let w, h;

    const resize = () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener("resize", resize);

    const isMobile = window.innerWidth < 768;
    const count = isMobile ? 70 : 180;
    const particles = [];

    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.7, vy: (Math.random() - 0.5) * 0.7,
        r: Math.random() * 3 + 1,
        o: Math.random() * 0.6 + 0.3,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.02 + 0.01,
      });
    }
    particlesRef.current = particles;

    const draw = () => {
      ctx.clearRect(0, 0, w, h);
      const mx = mouseRef.current.x;
      const my = mouseRef.current.y;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        // Mouse interaction — larger radius, stronger force
        const dx = p.x - mx;
        const dy = p.y - my;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 220 && dist > 0) {
          const force = (220 - dist) / 220 * 1.2;
          p.vx += (dx / dist) * force;
          p.vy += (dy / dist) * force;
        }

        p.vx *= 0.97;
        p.vy *= 0.97;
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = w;
        if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h;
        if (p.y > h) p.y = 0;

        // Pulsing glow per particle
        p.pulse += p.pulseSpeed;
        const pulseAlpha = p.o * (0.7 + 0.3 * Math.sin(p.pulse));

        // Outer glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 229, 176, ${pulseAlpha * 0.08})`;
        ctx.fill();

        // Core particle
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 229, 176, ${pulseAlpha})`;
        ctx.fill();

        // Bright center dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${pulseAlpha * 0.6})`;
        ctx.fill();

        // Connection lines — longer range, brighter
        for (let j = i + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const cdx = p.x - p2.x;
          const cdy = p.y - p2.y;
          const cd = Math.sqrt(cdx * cdx + cdy * cdy);
          if (cd < 160) {
            const lineAlpha = 0.15 * (1 - cd / 160);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(0, 229, 176, ${lineAlpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }

        // Mouse proximity glow line
        if (dist < 200 && dist > 0) {
          const glowAlpha = 0.25 * (1 - dist / 200);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(mx, my);
          ctx.strokeStyle = `rgba(0, 229, 176, ${glowAlpha})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
      animRef.current = requestAnimationFrame(draw);
    };
    draw();

    return () => {
      window.removeEventListener("resize", resize);
      if (animRef.current) cancelAnimationFrame(animRef.current);
    };
  }, []);

  const handleMouseMove = useCallback((e) => {
    mouseRef.current = { x: e.clientX, y: e.clientY };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      onMouseMove={handleMouseMove}
      style={{
        position: "absolute", top: 0, left: 0, width: "100%", height: "100%",
        pointerEvents: "auto", zIndex: 0,
      }}
    />
  );
};

/* ─── Animated Counter ─── */
const AnimatedCounter = ({ end, prefix = "", suffix = "", duration = 2000, decimals = 0, trigger = true }) => {
  const [val, setVal] = useState(0);
  const ref = useRef(null);

  useEffect(() => {
    if (!trigger) return;
    let start = 0;
    const startTime = performance.now();
    const animate = (now) => {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setVal(eased * end);
      if (progress < 1) ref.current = requestAnimationFrame(animate);
    };
    ref.current = requestAnimationFrame(animate);
    return () => { if (ref.current) cancelAnimationFrame(ref.current); };
  }, [end, duration, trigger]);

  return (
    <span style={{ fontFamily: "'JetBrains Mono', monospace" }}>
      {prefix}{decimals > 0 ? val.toFixed(decimals) : Math.round(val).toLocaleString()}{suffix}
    </span>
  );
};

/* ─── Intersection Observer Hook ─── */
const useInView = (options = {}) => {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold: 0.15, ...options });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
};

/* ─── Scroll Animated Section ─── */
const ScrollReveal = ({ children, delay = 0, direction = "up", style = {} }) => {
  const [ref, inView] = useInView();
  const transforms = {
    up: "translateY(60px)",
    down: "translateY(-60px)",
    left: "translateX(-60px)",
    right: "translateX(60px)",
  };
  return (
    <div ref={ref} style={{
      opacity: inView ? 1 : 0,
      transform: inView ? "translate(0,0)" : transforms[direction],
      transition: `opacity 0.8s cubic-bezier(0.16,1,0.3,1) ${delay}s, transform 0.8s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      ...style,
    }}>
      {children}
    </div>
  );
};

/* ─── 3D Tilt Card ─── */
const TiltCard = ({ children, style = {}, className = "" }) => {
  const cardRef = useRef(null);
  const [transform, setTransform] = useState("");
  const [glowPos, setGlowPos] = useState({ x: 50, y: 50 });
  const isMobile = typeof window !== "undefined" && window.innerWidth < 768;

  const handleMouseMove = (e) => {
    if (isMobile) return;
    const rect = cardRef.current.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    const rotateX = (y - 0.5) * -12;
    const rotateY = (x - 0.5) * 12;
    setTransform(`perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`);
    setGlowPos({ x: x * 100, y: y * 100 });
  };

  const handleMouseLeave = () => {
    setTransform("");
    setGlowPos({ x: 50, y: 50 });
  };

  return (
    <div
      ref={cardRef}
      className={className}
      onMouseMove={handleMouseMove}
      onMouseLeave={handleMouseLeave}
      style={{
        transform, transition: transform ? "transform 0.1s ease" : "transform 0.5s cubic-bezier(0.16,1,0.3,1)",
        position: "relative", overflow: "hidden", ...style,
      }}
    >
      <div style={{
        position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
        background: `radial-gradient(circle at ${glowPos.x}% ${glowPos.y}%, ${C.accent}12, transparent 60%)`,
        pointerEvents: "none", transition: "background 0.2s",
      }} />
      {children}
    </div>
  );
};

/* ─── Typewriter ─── */
const Typewriter = ({ text, speed = 50, delay = 500 }) => {
  const [displayed, setDisplayed] = useState("");
  const [started, setStarted] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setStarted(true), delay);
    return () => clearTimeout(t);
  }, [delay]);

  useEffect(() => {
    if (!started) return;
    let i = 0;
    const iv = setInterval(() => {
      i++;
      setDisplayed(text.slice(0, i));
      if (i >= text.length) clearInterval(iv);
    }, speed);
    return () => clearInterval(iv);
  }, [started, text, speed]);

  return (
    <span>
      {displayed}
      <span style={{
        display: "inline-block", width: 2, height: "0.9em",
        background: C.accent, marginLeft: 2, verticalAlign: "middle",
        animation: "blink 1s step-end infinite",
        opacity: displayed.length >= text.length ? 0 : 1,
      }} />
    </span>
  );
};

/* ─── Magnetic Button ─── */
const MagneticButton = ({ children, href, onClick, style = {} }) => {
  const btnRef = useRef(null);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const [showConfetti, setShowConfetti] = useState(false);
  const isMobile = typeof window !== "undefined" && window.innerWidth < 768;

  const handleMouseMove = (e) => {
    if (isMobile) return;
    const rect = btnRef.current.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    setOffset({ x: dx * 0.2, y: dy * 0.2 });
  };

  const handleMouseLeave = () => setOffset({ x: 0, y: 0 });

  const handleClick = (e) => {
    setShowConfetti(true);
    setTimeout(() => setShowConfetti(false), 1200);
    if (onClick) onClick(e);
  };

  return (
    <div style={{ position: "relative", display: "inline-block" }}
      onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave}>
      {showConfetti && <ConfettiBurst />}
      <a ref={btnRef} href={href} target="_blank" rel="noopener" onClick={handleClick} style={{
        display: "inline-flex", alignItems: "center", gap: 10,
        transform: `translate(${offset.x}px, ${offset.y}px)`,
        transition: offset.x === 0 ? "transform 0.5s cubic-bezier(0.16,1,0.3,1)" : "transform 0.08s ease",
        ...style,
      }}>
        {children}
      </a>
    </div>
  );
};

/* ─── Confetti Burst ─── */
const ConfettiBurst = () => {
  const [particles] = useState(() =>
    Array.from({ length: 24 }, (_, i) => ({
      x: (Math.random() - 0.5) * 200,
      y: (Math.random() - 0.5) * 200 - 40,
      r: Math.random() * 360,
      color: [C.accent, C.gold, C.blue, C.purple, "#FF6B6B"][Math.floor(Math.random() * 5)],
      size: Math.random() * 6 + 3,
      delay: Math.random() * 0.2,
    }))
  );

  return (
    <div style={{
      position: "absolute", top: "50%", left: "50%", pointerEvents: "none", zIndex: 100,
    }}>
      {particles.map((p, i) => (
        <div key={i} style={{
          position: "absolute", width: p.size, height: p.size,
          background: p.color, borderRadius: p.size > 5 ? "50%" : 1,

          opacity: 0,
          "--cx": `${p.x}px`, "--cy": `${p.y}px`, "--cr": `${p.r}deg`,
        }} />
      ))}
    </div>
  );
};
