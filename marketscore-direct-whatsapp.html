const analytics = {
  _q: [], _start: Date.now(), _scroll: 0, _n: 0,
  init() {
    const p = new URLSearchParams(window.location.search);
    this._ref = p.get("ref") || "direct";
    this.track("page_view", { source: "direct_outreach", ref: this._ref });
    let fired = new Set();
    window.addEventListener("scroll", () => {
      const pct = Math.round((window.pageYOffset / (document.documentElement.scrollHeight - window.innerHeight)) * 100);
      this._scroll = Math.max(this._scroll, pct);
      [25, 50, 75, 100].forEach(m => { if (pct >= m && !fired.has(m)) { fired.add(m); this.track("scroll", { depth: m }); } });
    }, { passive: true });
  },
  track(e, d = {}) {
    this._n++;
    const p = { event: e, t: Math.round((Date.now() - this._start) / 1000), ...d };
    this._q.push(p);
    try { if (window.gtag) window.gtag("event", e, { ...d, source: "direct_outreach" }); } catch {}
    if (window.location.hostname === "localhost") console.log(`[MS-DM] ${e}`, p);
  },
};
